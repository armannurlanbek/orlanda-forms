# Generic reverse-proxy example for a NON-cluster deploy (e.g. a single VPS with
# its own public IP). The Orlanda cluster does NOT use this — it uses Cloudflare
# Tunnel + Load Balancer (no inbound ports, no nginx); see CLUSTER_DEPLOY.md.
#
# TLS via certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d forms.example.com
# certbot will manage the listen 443 / ssl_certificate lines automatically.

# Redirect HTTP -> HTTPS.
server {
    listen 80;
    server_name forms.example.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name forms.example.com;

    # Managed by certbot:
    # ssl_certificate     /etc/letsencrypt/live/forms.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/forms.example.com/privkey.pem;

    # The app enforces its own CSP / security headers (§16.7); nginx just proxies.
    client_max_body_size 30m;   # accommodate attachment uploads (§16.2 caps)

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # DB-free health endpoint for external uptime checks.
    location = /healthz {
        proxy_pass http://127.0.0.1:8001/healthz;
    }
}
